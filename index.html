<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Sniper | Hail Intelligence Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <style>
        :root {
            --navy: #0d1b2a;
            --navy-mid: #132236;
            --navy-light: #1a2f47;
            --navy-border: #1e3a56;
            --green: #22c55e;
            --green-dark: #16a34a;
            --orange: #f97316;
            --orange-dark: #ea6c0a;
            --yellow: #eab308;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --accent: #38bdf8;
        }

        *,*::before,*::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--navy);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }

        #shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            background: var(--navy);
            padding-top: 120px;
            overflow: hidden;
        }

        #hdr {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: linear-gradient(135deg, #0a1520, var(--navy-mid));
            border-bottom: 1px solid var(--navy-border);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-sub {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        #hdr > div:nth-child(2) {
            flex: 1;
            text-align: center;
        }

        #hdr > div:nth-child(2) > div:first-child {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--text-muted);
        }

        #hdr > div:nth-child(2) > div:last-child {
            font-size: 10px;
            color: var(--text-dim);
        }

        #hdr > div:last-child {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: auto;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-label {
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
        }

        #tier-badge {
            padding: 6px 12px;
            background: linear-gradient(135deg, #1e3a56, #0d1b2a);
            border: 1px solid var(--navy-border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        #tier-badge:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #main {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - 120px);
            overflow: hidden;
        }

        #map-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: none;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        #sidebar {
            display: flex;
            flex-direction: column;
            width: 400px;
            background: var(--navy-mid);
            border-left: 1px solid var(--navy-border);
            overflow-y: auto;
            flex: 1;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--navy-border);
        }

        .sidebar-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .input-group label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .input-group input,
        .input-group select {
            padding: 8px 12px;
            background: var(--navy);
            border: 1px solid var(--navy-border);
            border-radius: 4px;
            color: var(--text);
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.1);
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 10px 14px;
            background: linear-gradient(135deg, #1e3a56, var(--navy));
            border: 1px solid var(--navy-border);
            border-radius: 4px;
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
            border-color: var(--accent);
            color: var(--accent);
        }

        button.active {
            background: var(--accent);
            color: var(--navy);
            border-color: var(--accent);
        }

        #table-wrap {
            flex: 1;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead {
            position: sticky;
            top: 0;
            background: var(--navy);
            border-bottom: 1px solid var(--navy-border);
        }

        th {
            padding: 10px 12px;
            text-align: left;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 11px;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--navy-border);
            color: var(--text);
        }

        tr:hover {
            background: var(--navy-light);
            cursor: pointer;
        }

        .chip {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            display: inline-block;
        }

        .c-1 { background: rgba(34,197,94,0.2); color: #22c55e; }
        .c-2 { background: rgba(132,204,22,0.2); color: #84cc16; }
        .c-3 { background: rgba(234,179,8,0.2); color: #eab308; }
        .c-4 { background: rgba(249,115,22,0.2); color: #f97316; }
        .c-5 { background: rgba(239,68,68,0.2); color: #ef4444; }
        .c-6 { background: rgba(168,85,247,0.2); color: #a855f7; }

        .age-f { color: #ef4444; font-weight: bold; }
        .age-h { color: #f97316; }
        .age-w { color: #eab308; }
        .age-c { color: #94a3b8; }

        .row-6 { background: rgba(168,85,247,0.1); }
        .row-5 { background: rgba(239,68,68,0.1); }
        .row-4 { background: rgba(249,115,22,0.1); }
        .row-3 { background: rgba(234,179,8,0.1); }
        .row-2 { background: rgba(132,204,22,0.1); }
        .row-1 { background: rgba(34,197,94,0.1); }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--navy);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            gap: 20px;
        }

        #login-screen.hidden {
            display: none;
        }

        .login-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--navy-mid);
            padding: 40px;
            border: 1px solid var(--navy-border);
            border-radius: 8px;
            width: 100%;
            max-width: 320px;
        }

        .login-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: var(--text);
            text-align: center;
        }

        .login-sub {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }

        #license-input {
            padding: 12px 16px;
            background: var(--navy);
            border: 1px solid var(--navy-border);
            border-radius: 4px;
            color: var(--text);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        #license-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        #activate-btn {
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            border: none;
            border-radius: 4px;
            color: var(--navy);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #activate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(56, 189, 248, 0.3);
        }

        #login-error {
            color: #ef4444;
            font-size: 12px;
            text-align: center;
            min-height: 16px;
        }

        #info-box {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--navy-mid);
            border: 1px solid var(--navy-border);
            border-radius: 8px;
            padding: 16px;
            max-width: 280px;
            z-index: 100;
            display: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        #ib-city {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            color: var(--text);
            margin-bottom: 4px;
        }

        #ib-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        #ib-size {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        #ib-ago {
            font-size: 11px;
            color: var(--text-dim);
        }

        #ib-close {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        #ib-close:hover {
            color: var(--text);
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--navy-mid);
            border: 1px solid var(--navy-border);
            border-radius: 4px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            z-index: 500;
            transition: opacity 0.3s ease;
        }

        #toast.on {
            opacity: 1;
            pointer-events: auto;
        }

        #bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--accent));
            width: 0%;
            z-index: 999;
            transition: width 0.3s ease;
        }

        #bar.on {
            width: 100%;
        }

        .shape-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: var(--navy-light);
            border-top: 1px solid var(--navy-border);
            padding: 12px 16px;
            gap: 12px;
        }

        #shape-bar {
            display: none;
        }

        #shape-bar-count {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--accent);
        }

        .regrid-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            background: var(--navy-light);
            border-top: 1px solid var(--navy-border);
        }

        #regrid-panel {
            display: none;
        }

        #regrid-status {
            display: none;
            font-size: 12px;
            color: var(--text-muted);
        }

        .canvass-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .canvass-modal.on {
            display: flex;
        }

        .modal-content {
            background: var(--navy-mid);
            border: 1px solid var(--navy-border);
            border-radius: 8px;
            padding: 24px;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--text);
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--navy);
            border: 1px solid var(--navy-border);
            border-radius: 4px;
            color: var(--text);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-button {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: var(--navy);
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
        }

        .tab-buttons {
            display: none;
            gap: 8px;
            padding: 10px;
            background: var(--navy);
            border-top: 1px solid var(--navy-border);
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            background: var(--navy-mid);
            border: 1px solid var(--navy-border);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
        }

        .tab-btn.tab-active {
            background: var(--navy-light);
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 900px) {
            #sidebar {
                width: 100%;
            }

            .tab-buttons {
                display: flex;
            }

            #map-wrap {
                display: flex;
            }
        }

        /* Leaflet overrides */
        .hail-marker {
            background: none !important;
            border: none !important;
        }

        .leaflet-draw {
            display: none !important;
        }

        .leaflet-control-zoom {
            border: 1px solid var(--navy-border) !important;
        }

        .leaflet-control-zoom a {
            background: var(--navy-mid) !important;
            color: var(--text) !important;
            border: 1px solid var(--navy-border) !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--navy-light) !important;
            border-color: var(--accent) !important;
            color: var(--accent) !important;
        }
    </style>
</head>
<body>
    <div id="bar"></div>

    <div id="login-screen">
        <div class="login-box">
            <div class="login-title">STORM SNIPER</div>
            <div class="login-sub">Hail Intelligence Platform</div>
            <input type="text" id="license-input" placeholder="License Key" />
            <button id="activate-btn">Activate</button>
            <div id="login-error"></div>
        </div>
    </div>

    <div id="hdr">
        <div>
            <div class="logo-text">⚡ SNIPER</div>
            <div class="logo-sub">HAIL</div>
        </div>
        <div>
            <div>US HAIL EVENTS</div>
            <div>Real-time Damage Assessment</div>
        </div>
        <div>
            <div class="stat-box">
                <div class="stat-label">Events</div>
                <div class="stat-value" id="stat-events">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Claims</div>
                <div class="stat-value" id="stat-claims">$0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Avg Size</div>
                <div class="stat-value" id="stat-size">0.0"</div>
            </div>
            <button id="tier-badge">Tier 1</button>
        </div>
    </div>

    <div id="shell" style="display: none;">
        <div id="main">
            <div id="map-wrap" style="display: flex;">
                <div id="map"></div>
                <div id="info-box">
                    <button id="ib-close">✕</button>
                    <div id="ib-city"></div>
                    <div id="ib-sub"></div>
                    <div id="ib-size"></div>
                    <div id="ib-ago"></div>
                </div>
            </div>
            <div id="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">Search</div>
                    <div class="input-group">
                        <input type="text" id="qsearch" placeholder="Quick search..." />
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-title">Filters</div>
                    <div class="input-group">
                        <label>Date Range</label>
                        <input type="date" id="start-date" />
                        <input type="date" id="end-date" />
                    </div>
                    <div class="input-group">
                        <label>Min Hail Size</label>
                        <input type="number" id="minHail" value="1.0" step="0.1" />
                    </div>
                    <div class="input-group">
                        <label>State Filter</label>
                        <select id="stateFilter">
                            <option value="">All States</option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
                            <option value="DE">Delaware</option>
                            <option value="FL">Florida</option>
                            <option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option>
                            <option value="ID">Idaho</option>
                            <option value="IL">Illinois</option>
                            <option value="IN">Indiana</option>
                            <option value="IA">Iowa</option>
                            <option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option>
                            <option value="LA">Louisiana</option>
                            <option value="ME">Maine</option>
                            <option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option>
                            <option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option>
                            <option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option>
                            <option value="MT">Montana</option>
                            <option value="NE">Nebraska</option>
                            <option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option>
                            <option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option>
                            <option value="NY">New York</option>
                            <option value="NC">North Carolina</option>
                            <option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option>
                            <option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="RI">Rhode Island</option>
                            <option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option>
                            <option value="TN">Tennessee</option>
                            <option value="TX">Texas</option>
                            <option value="UT">Utah</option>
                            <option value="VT">Vermont</option>
                            <option value="VA">Virginia</option>
                            <option value="WA">Washington</option>
                            <option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option>
                            <option value="WY">Wyoming</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Radius Search (miles)</label>
                        <input type="number" id="radius" step="1" />
                        <input type="text" id="zip-lookup" placeholder="Enter ZIP code" />
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-title">Drawing Tools</div>
                    <div class="button-group">
                        <button id="btn-draw-circle">Circle</button>
                        <button id="btn-draw-rect">Rectangle</button>
                    </div>
                    <button id="btn-draw-clear" style="display: none;">Clear Shape</button>
                </div>
                <div class="sidebar-section">
                    <div class="button-group">
                        <button id="update-btn">Update</button>
                        <button id="reset-btn">Reset</button>
                    </div>
                </div>
                <div id="regrid-panel" class="regrid-panel">
                    <button id="btn-regrid">Property Records</button>
                    <button id="btn-melissa">Get Emails</button>
                </div>
                <div id="regrid-status"></div>
                <div id="shape-bar" class="shape-bar">
                    <div>Filtered: <span id="shape-bar-count">0</span></div>
                    <button id="btn-shape-export" style="flex: 0; padding: 6px 12px;">Export</button>
                </div>
                <div id="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>City</th>
                                <th>State</th>
                                <th>Size</th>
                                <th>Date</th>
                                <th>ZIP</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div id="canvass-modal" class="canvass-modal">
            <div class="modal-content">
                <button class="modal-close">✕</button>
                <div class="modal-title">Canvas Export</div>
                <input type="text" class="modal-input" id="canvass-name" placeholder="Campaign name" />
                <button class="modal-button" id="canvass-export-btn">Export Contacts</button>
            </div>
        </div>
        <div class="tab-buttons">
            <button id="tab-map" class="tab-btn tab-active">Map</button>
            <button id="tab-data" class="tab-btn">Data</button>
        </div>
    </div>

    <div id="toast"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Heat -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <!-- Leaflet Draw JS -->
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

    <script>
        // Global state
        let gmap = null;
        let allEvents = [];
        let dispEvents = [];
        let currentTier = 0;
        let zipLL = null;

        function setDefaultDates(){
            const today = new Date();
            const sevenDaysAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('start-date').value = ymd(sevenDaysAgo);
            document.getElementById('end-date').value = ymd(today);
        }

        // Login functionality
        document.getElementById('activate-btn').addEventListener('click', function() {
            const licenseInput = document.getElementById('license-input');
            const shell = document.getElementById('shell');
            const loginScreen = document.getElementById('login-screen');

            if (licenseInput.value.trim().toUpperCase() === 'NPA') {
                currentTier = 1;
                loginScreen.classList.add('hidden');
                shell.style.display = 'flex';
                setTimeout(() => {
                    initMap();
                }, 100);
            } else {
                document.getElementById('login-error').textContent = 'Invalid license key';
            }
        });

        document.getElementById('license-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('activate-btn').click();
            }
        });

        document.getElementById('tier-badge').addEventListener('click', function() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('shell').style.display = 'none';
            document.getElementById('license-input').value = '';
            document.getElementById('login-error').textContent = '';
        });

        // Button handlers
        document.getElementById('update-btn').addEventListener('click', fetchAndRender);
        document.getElementById('reset-btn').addEventListener('click', resetAll);
        document.getElementById('btn-draw-circle').addEventListener('click', ()=>setDrawMode('circle'));
        document.getElementById('btn-draw-rect').addEventListener('click', ()=>setDrawMode('rectangle'));
        document.getElementById('btn-draw-clear').addEventListener('click', clearDrawing);
        document.getElementById('btn-melissa').addEventListener('click', melissaClick);
        document.getElementById('ib-close').addEventListener('click', ()=>document.getElementById('info-box').style.display='none');

        // Canvass modal
        document.getElementById('canvass-btn') ? document.getElementById('canvass-btn').addEventListener('click', function() {
            document.getElementById('canvass-modal').classList.add('on');
        }) : null;

        // Tab navigation
        ['tab-map', 'tab-data'].forEach(id => {
            const tab = document.getElementById(id);
            if(tab) tab.addEventListener('click', function() {
                mobileTab(id === 'tab-map' ? 'map' : 'data');
            });
        });

        // Regrid button
        document.getElementById('btn-regrid') ? document.getElementById('btn-regrid').addEventListener('click', regridClick) : null;

        // Quick search
        document.getElementById('qsearch').addEventListener('keyup', function() {
            const q = this.value.toLowerCase();
            const rows = document.querySelectorAll('#table-body tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(q) ? '' : 'none';
            });
        });

        function dayList(s,e){const codes=[];const cur=new Date(s.replace(/-/g,'/')+' 00:00:00');const end=new Date(e.replace(/-/g,'/')+' 00:00:00');while(cur<=end){const yy=cur.getFullYear().toString().slice(-2);const mm=String(cur.getMonth()+1).padStart(2,'0');const dd=String(cur.getDate()).padStart(2,'0');codes.push(yy+mm+dd);cur.setDate(cur.getDate()+1);}return codes;}
        function fixCoord(v,isLon){let s=(v||'').toString().trim();if(!s)return null;if(!s.includes('.'))s=s.length===4?s.slice(0,2)+'.'+s.slice(2):s.slice(0,3)+'.'+s.slice(3);const n=parseFloat(s);return isNaN(n)?null:(isLon&&n>0?-n:n);}
        function hc(s){return s>=6?'#a855f7':s>=3.5?'#ef4444':s>=2.5?'#f97316':s>=1.75?'#eab308':s>=1.0?'#84cc16':'#22c55e';}
        function cc(s){return s>=6?'c-6':s>=3.5?'c-5':s>=2.5?'c-4':s>=1.75?'c-3':s>=1.0?'c-2':'c-1';}
        function ac(d){return d<=7?'age-f':d<=30?'age-h':d<=90?'age-w':'age-c';}
        function al(d){return d===0?'Today 🔥':d===1?'1d ago 🔥':d<=7?d+'d ago 🔥':d+'d ago';}
        function rc(s){return s>=6?'row-6':s>=3.5?'row-5':s>=2.5?'row-4':s>=1.75?'row-3':s>=1.0?'row-2':'row-1';}
        function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
        function ymd(d){return d.toISOString().split('T')[0]}
        function renderTable(){renderTableData(dispEvents);}
        function haversine(la1,lo1,la2,lo2){const R=3958.8,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
        function hl(s){return s>=6?'Severe ⚡':s>=3.5?'Major Claim':s>=2.5?'Insurance Claim ✓':s>=1.75?'Ins. Threshold':s>=1.0?'Moderate':'Minor';}
        function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3500);}
        function loading(on){document.getElementById('bar').classList.toggle('on',on);}
        function updateStats(){
            const totalSize = dispEvents.reduce((sum, e) => sum + e.size, 0);
            const avgSize = dispEvents.length ? (totalSize / dispEvents.length).toFixed(1) : '0.0';
            document.getElementById('stat-events').textContent = dispEvents.length;
            document.getElementById('stat-size').textContent = avgSize + '"';
        }
        function applyRadius(){
            const radius = parseFloat(document.getElementById('radius').value) || 0;
            if(!radius || !zipLL) return;
            dispEvents = allEvents.filter(e => {
                const minSz = parseFloat(document.getElementById('minHail').value) || 1.0;
                if(e.size < minSz) return false;
                const state = document.getElementById('stateFilter').value.toUpperCase();
                if(state && e.state !== state) return false;
                const dist = haversine(zipLL.lat, zipLL.lng, e.lat, e.lng);
                return dist <= radius;
            });
            renderTableData(dispEvents);
        }
        async function geoZip(zip){
            try {
                var res = await fetch('https://nominatim.openstreetmap.org/search?postalcode='+zip+'&country=US&format=json&limit=1');
                var data = await res.json();
                if(data && data[0]) return {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon)};
                return null;
            } catch(e) { return null; }
        }
        function fly(e){
            gmap.setView([e.lat, e.lng], 11, {animate: true});
            document.getElementById('ib-city').textContent = e.city + ', ' + e.state;
            document.getElementById('ib-sub').textContent = e.county + ' County · ' + e.date;
            document.getElementById('ib-size').style.color = hc(e.size);
            document.getElementById('ib-size').textContent = e.size + '"  ' + hl(e.size);
            document.getElementById('ib-ago').textContent = al(e.daysAgo);
            document.getElementById('info-box').style.display = 'block';
        }
        function setChromeHeight(){
            if(screen.width<=900||document.documentElement.clientWidth<=900){
                if(gmap) gmap.invalidateSize();
                return;
            }
            var wrap = document.getElementById('map-wrap');
            var mapEl = document.getElementById('map');
            if(!wrap || !mapEl) return;
            var rect = wrap.getBoundingClientRect();
            var mapH = Math.max(window.innerHeight - rect.top, 300);
            wrap.style.height = mapH + 'px';
            mapEl.style.height = mapH + 'px';
            if(gmap) gmap.invalidateSize();
        }
        function resetAll(){
            setDefaultDates();
            document.getElementById('minHail').value = '1.0';
            document.getElementById('stateFilter').value = '';
            document.getElementById('radius').value = '';
            document.getElementById('zip-lookup').value = '';
            zipLL = null;
            allEvents = [];
            dispEvents = [];
            renderTable();
            renderMap();
            updateStats();
            toast('↻ Reset to defaults');
        }
        function exportCSV(){
            const filtered = window._shapeFiltered || dispEvents;
            doExport(filtered, 'shape-export-' + Date.now());
        }
        function doExport(events,label){
            if(!events || !events.length) { toast('📦 No events to export'); return; }
            let csv = 'City,State,County,Size,Date,Latitude,Longitude,ZIP\n';
            events.forEach(e => {
                csv += `"${x(e.city)}","${e.state}","${x(e.county)}",${e.size},"${e.date}",${e.lat},${e.lng},"${e.zip||''}"\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = label + '.csv';
            a.click();
            URL.revokeObjectURL(url);
            toast('✓ Exported ' + events.length + ' events');
        }
        async function lookupZipCodes(events){
            if(!window._zipCache) window._zipCache = {};
            for(var i = 0; i < events.length; i++){
                var e = events[i];
                if(e.zip) continue;
                var key = e.lat.toFixed(3) + ',' + e.lng.toFixed(3);
                if(window._zipCache[key]){
                    var zip = window._zipCache[key];
                    allEvents.forEach(a => { if(a.lat.toFixed(3) === e.lat.toFixed(3) && a.lng.toFixed(3) === e.lng.toFixed(3)) a.zip = zip; });
                    dispEvents.forEach(a => { if(a.lat.toFixed(3) === e.lat.toFixed(3) && a.lng.toFixed(3) === e.lng.toFixed(3)) a.zip = zip; });
                    continue;
                }
                try {
                    var res = await fetch('https://nominatim.openstreetmap.org/reverse?lat='+e.lat+'&lon='+e.lng+'&format=json&addressdetails=1');
                    var data = await res.json();
                    if(data && data.address && data.address.postcode){
                        var zip = data.address.postcode;
                        window._zipCache[key] = zip;
                        allEvents.forEach(a => { if(a.lat.toFixed(3) === e.lat.toFixed(3) && a.lng.toFixed(3) === e.lng.toFixed(3)) a.zip = zip; });
                        dispEvents.forEach(a => { if(a.lat.toFixed(3) === e.lat.toFixed(3) && a.lng.toFixed(3) === e.lng.toFixed(3)) a.zip = zip; });
                    }
                } catch(err) {}
                if(i % 5 === 0) renderTableData(dispEvents);
                await new Promise(r => setTimeout(r, 1100));
            }
            renderTableData(dispEvents);
        }
        function mobileTab(tab){
            const mapWrap = document.getElementById('map-wrap');
            const sidebar = document.getElementById('sidebar');
            const tabMap = document.getElementById('tab-map');
            const tabData = document.getElementById('tab-data');
            if(!mapWrap || !sidebar) return;
            if(tab === 'map'){
                mapWrap.style.display = 'flex';
                sidebar.style.display = 'none';
                tabMap.classList.add('tab-active');
                tabData.classList.remove('tab-active');
                setTimeout(() => { if(gmap) gmap.invalidateSize(); }, 100);
            } else {
                mapWrap.style.display = 'none';
                sidebar.style.display = 'flex';
                tabMap.classList.remove('tab-active');
                tabData.classList.add('tab-active');
            }
        }
        function regridClick(){
            if(currentTier >= 2){ toast('🏠 Property Records coming soon.'); }
            else { toast('🔒 Upgrade to Tier 2 to access property data.'); }
        }
        function melissaClick(){
            if(currentTier >= 3){ toast('📞 Melissa integration coming soon!'); }
            else { toast('🔒 Upgrade to Tier 3 to get email & phone contacts.'); }
        }

        // Core fetch & render
        async function fetchAndRender(){
            loading(true);
            try {
                const start = document.getElementById('start-date').value;
                const end = document.getElementById('end-date').value;
                if(!start || !end) { toast('📅 Set date range'); loading(false); return; }
                const codes = dayList(start, end);
                allEvents = [];
                for(const code of codes){
                    await fetchDay(code, 'hail', 0, '', false);
                }
                dispEvents = allEvents;
                applyRadius();
                lookupZipCodes(allEvents);
                updateStats();
                renderMap();
            } catch(err) {
                console.error(err);
                toast('❌ Fetch error');
            }
            loading(false);
        }
        async function fetchDay(code,etype,minSz,state,today){
            try {
                const url = `https://www.spc.noaa.gov/climo/reports/${code}_${etype}.csv`;
                const res = await fetch(url);
                if(!res.ok) return;
                const txt = await res.text();
                parseCSV(txt, code, etype, minSz, state, today);
            } catch(err) {
                console.error('Fetch error for ' + code, err);
            }
        }
        function parseCSV(txt,code,etype,minSz,state,today){
            const lines = txt.split('\n');
            for(let i = 1; i < lines.length; i++){
                const line = lines[i].trim();
                if(!line) continue;
                const parts = line.split(',').map(p => p.trim());
                if(parts.length < 9) continue;
                let timeStr = parts[0];
                let lat = fixCoord(parts[4], false);
                let lng = fixCoord(parts[5], true);
                let size = parseFloat(parts[6]);
                if(!lat || !lng || isNaN(size)) continue;
                const eventDate = '20' + code.substring(0,2) + '-' + code.substring(2,4) + '-' + code.substring(4,6);
                const now = new Date();
                const eventDateObj = new Date(eventDate);
                const daysAgo = Math.floor((now - eventDateObj) / (1000 * 60 * 60 * 24));
                const city = parts[1] || '';
                const st = parts[2] || '';
                const county = parts[3] || '';
                if(minSz && size < minSz) continue;
                if(state && st !== state.toUpperCase()) continue;
                allEvents.push({ city, state: st, county, lat, lng, size, date: eventDate, daysAgo, zip: '' });
            }
        }
        function renderTableData(events){
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if(!events || !events.length) return;
            events.forEach(e => {
                const row = document.createElement('tr');
                row.className = rc(e.size);
                row.innerHTML = `
                    <td>${x(e.city)}</td>
                    <td>${e.state}</td>
                    <td><span class="chip ${cc(e.size)}">${e.size}"</span></td>
                    <td class="${ac(e.daysAgo)}">${e.date}</td>
                    <td>${e.zip || '-'}</td>
                `;
                row.addEventListener('click', () => fly(e));
                tbody.appendChild(row);
            });
        }
        function renderMap(){
            if(!gmap) return;
            if(window._markerGroup) gmap.removeLayer(window._markerGroup);
            if(window._heatLayer) gmap.removeLayer(window._heatLayer);
            window._markerGroup = L.layerGroup().addTo(gmap);

            if(!dispEvents.length) return;

            var heatData = dispEvents.map(e => [e.lat, e.lng, e.size >= 6 ? 1.0 : e.size >= 3.5 ? 0.8 : e.size >= 2.5 ? 0.6 : e.size >= 1.75 ? 0.4 : 0.2]);
            window._heatLayer = L.heatLayer(heatData, { radius: 30, blur: 20, maxZoom: 10, max: 1.0,
                gradient: {0.2: '#22c55e', 0.4: '#84cc16', 0.6: '#eab308', 0.8: '#f97316', 0.9: '#ef4444', 1.0: '#a855f7'}
            }).addTo(gmap);

            dispEvents.forEach(e => {
                var color = hc(e.size);
                var scale = e.size >= 6 ? 1.4 : e.size >= 3.5 ? 1.2 : e.size >= 2.5 ? 1.0 : e.size >= 1.75 ? 0.85 : 0.7;
                var size = Math.round(12 * scale);
                var icon = L.divIcon({
                    className: 'hail-marker',
                    html: '<div style="width:'+size*2+'px;height:'+size*2+'px;border-radius:50%;background:'+color+';border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>',
                    iconSize: [size*2, size*2],
                    iconAnchor: [size, size]
                });
                var marker = L.marker([e.lat, e.lng], {icon: icon, title: e.city+', '+e.state+' — '+e.size+'" — '+al(e.daysAgo)});
                marker.on('click', () => fly(e));
                marker.addTo(window._markerGroup);
            });

            if(zipLL && parseFloat(document.getElementById('radius').value)){
                gmap.setView([zipLL.lat, zipLL.lng], 9);
            } else {
                var bounds = L.latLngBounds(dispEvents.map(e => [e.lat, e.lng]));
                gmap.fitBounds(bounds, {padding: [30, 30], maxZoom: 9});
            }
        }

        function filterByShape(shape, type){
            if(!allEvents.length) return;
            var source = allEvents.filter(e => {
                var minSz = parseFloat(document.getElementById('minHail').value) || 1.0;
                var state = document.getElementById('stateFilter').value.toUpperCase();
                if(e.size < minSz) return false;
                if(state && e.state !== state) return false;
                return true;
            });

            var filtered;
            if(type === 'circle') {
                var center = shape.getLatLng();
                var radius = shape.getRadius();
                filtered = source.filter(e => {
                    return gmap.distance(center, L.latLng(e.lat, e.lng)) <= radius;
                });
            } else {
                var bounds = shape.getBounds();
                filtered = source.filter(e => bounds.contains(L.latLng(e.lat, e.lng)));
            }

            dispEvents = filtered;
            renderTableData(filtered);
            window._shapeFiltered = filtered;
            document.getElementById('canvass-modal').classList.remove('on');
            document.getElementById('shape-bar-count').textContent = filtered.length;
            document.getElementById('shape-bar').style.display = 'flex';
            toast('🔷 ' + filtered.length + ' events inside shape');
        }

        function initMap(){
            gmap = L.map('map', {zoomControl: true}).setView([39.82, -98.57], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(gmap);

            var drawnItems = new L.FeatureGroup();
            gmap.addLayer(drawnItems);
            window._drawnItems = drawnItems;

            var drawControl = new L.Control.Draw({
                draw: { polyline: false, polygon: false, marker: false, circlemarker: false,
                    circle: { shapeOptions: { color: '#0d1b2a', fillOpacity: 0.08, weight: 2 } },
                    rectangle: { shapeOptions: { color: '#0d1b2a', fillOpacity: 0.08, weight: 2 } }
                },
                edit: false
            });
            window._drawControl = drawControl;
            window._activeShape = null;

            window.setDrawMode = function(mode) {
                if (window._currentDrawHandler) { window._currentDrawHandler.disable(); }
                if (mode === 'circle') {
                    window._currentDrawHandler = new L.Draw.Circle(gmap, drawControl.options.draw.circle);
                } else {
                    window._currentDrawHandler = new L.Draw.Rectangle(gmap, drawControl.options.draw.rectangle);
                }
                window._currentDrawHandler.enable();
                document.getElementById('btn-draw-circle').classList.toggle('active', mode === 'circle');
                document.getElementById('btn-draw-rect').classList.toggle('active', mode === 'rectangle');
            };

            window.clearDrawing = function() {
                drawnItems.clearLayers();
                window._activeShape = null;
                window._activeShapeType = null;
                window._shapeFiltered = null;
                window._regridParcels = [];
                document.getElementById('regrid-panel').style.display = 'none';
                document.getElementById('regrid-status').style.display = 'none';
                document.getElementById('btn-draw-circle').classList.remove('active');
                document.getElementById('btn-draw-rect').classList.remove('active');
                document.getElementById('btn-draw-clear').style.display = 'none';
                document.getElementById('shape-bar').style.display = 'none';
                renderTable();
                toast('🗑 Drawing cleared');
            };

            gmap.on(L.Draw.Event.CREATED, function(ev) {
                drawnItems.clearLayers();
                var layer = ev.layer;
                drawnItems.addLayer(layer);
                window._activeShape = layer;
                window._activeShapeType = ev.layerType;
                filterByShape(layer, ev.layerType);
                document.getElementById('btn-draw-circle').classList.remove('active');
                document.getElementById('btn-draw-rect').classList.remove('active');
                document.getElementById('btn-draw-clear').style.display = '';
            });

            window._clearShape = () => { if(window.clearDrawing) window.clearDrawing(); };

            setChromeHeight();
            setDefaultDates();
            fetchAndRender();
        }

        // ZIP code lookup
        document.getElementById('zip-lookup').addEventListener('keypress', async function(e) {
            if(e.key === 'Enter') {
                const zip = this.value.trim();
                if(!zip) return;
                loading(true);
                zipLL = await geoZip(zip);
                if(zipLL) {
                    applyRadius();
                    renderMap();
                    toast('📍 ZIP found: ' + zipLL.lat.toFixed(2) + ', ' + zipLL.lng.toFixed(2));
                } else {
                    toast('❌ ZIP not found');
                }
                loading(false);
            }
        });

        // Modal handlers
        const modalClose = document.querySelector('.modal-close');
        if(modalClose) {
            modalClose.addEventListener('click', () => document.getElementById('canvass-modal').classList.remove('on'));
        }

        const canvassExportBtn = document.getElementById('canvass-export-btn');
        if(canvassExportBtn) {
            canvassExportBtn.addEventListener('click', exportCSV);
        }

        // Window resize handler
        window.addEventListener('resize', setChromeHeight);
    </script>
</body>
</html>
